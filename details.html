<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes — WeatherApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/details.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
  <nav class="nav-bar">
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" type="button"><i data-lucide="menu"></i></button>
    <span class="nav-brand">WeatherApp</span>
    <div class="nav-links" id="nav-links">
      <a href="/">Clima</a>
      <a href="details.html">Detalhes</a>
      <a href="favorites.html">Favoritos</a>
    </div>
  </nav>

  <div id="app">
    <main>
      <div id="loading" class="hidden">
        <div class="skeleton-card">
          <div class="skeleton skeleton-icon-wrap"></div>
          <div class="skeleton skeleton-temp" style="width:30%"></div>
          <div class="skeleton skeleton-line" style="width:40%"></div>
        </div>
        <div class="skeleton-grid" style="margin-bottom:1.5rem">
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
          <div class="skeleton skeleton-item"></div>
        </div>
        <div class="skeleton skeleton-section-title"></div>
        <div class="skeleton" style="height:200px;border-radius:12px"></div>
      </div>
      <div id="error" class="hidden"></div>

      <section id="detail-header" class="hidden">
        <h2 id="detail-city-name"></h2>
        <span id="detail-country"></span>
        <button id="detail-fav-btn" class="btn-icon" title="Salvar nos favoritos"><i data-lucide="star" id="detail-fav-icon"></i></button>
      </section>

      <section id="detail-current" class="hidden">
        <div class="detail-card">
          <span id="detail-icon"></span>
          <span id="detail-temp"></span>
          <span id="detail-desc"></span>
        </div>
        <div class="detail-grid">
          <div class="detail-item">
            <span class="label">Sensação</span>
            <span class="value" id="detail-feels"></span>
          </div>
          <div class="detail-item">
            <span class="label">Umidade</span>
            <span class="value" id="detail-humidity"></span>
          </div>
          <div class="detail-item">
            <span class="label">Vento</span>
            <span class="value" id="detail-wind"></span>
          </div>
        </div>
      </section>

      <section id="detail-hourly" class="hidden">
        <h3>Próximas 24 horas</h3>
        <canvas id="hourly-chart"></canvas>
        <div id="hourly-table"></div>
      </section>

      <div style="text-align: center; margin-top: 1.5rem;">
        <a href="/" class="btn-link"><i data-lucide="arrow-left"></i> Voltar</a>
      </div>
    </main>

    <footer>
      <p>Dados: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a></p>
    </footer>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/pages/details.js"></script>
</body>
</html>
