<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Config — Clima Tempo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/config.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/">🏠 Clima</a>
    <a href="details.html">📊 Detalhes</a>
    <a href="favorites.html">⭐ Favoritos</a>
    <a href="config.html">⚙️</a>
  </nav>

  <div id="app">
    <header>
      <h1>⚙️ Configurações</h1>
    </header>

    <main>
      <form id="config-form">
        <div class="form-group">
          <label for="unit-select">Unidade de temperatura</label>
          <select id="unit-select">
            <option value="celsius">°C — Celsius</option>
            <option value="fahrenheit">°F — Fahrenheit</option>
          </select>
        </div>

        <div class="form-group">
          <label for="theme-select">Tema</label>
          <select id="theme-select">
            <option value="auto">Automático (sistema)</option>
            <option value="light">Claro</option>
            <option value="dark">Escuro</option>
          </select>
        </div>

        <button type="submit" class="btn-link">Salvar</button>
      </form>
    </main>

    <footer>
      <p>Dados: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a></p>
    </footer>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/pages/config.js"></script>
</body>
</html>
