<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima Tempo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="/">Clima</a>
    <a href="details.html">Detalhes</a>
    <a href="favorites.html">Favoritos</a>
    <a href="config.html">Config</a>
  </nav>

  <div id="app">
    <header>
      <h1>Clima Tempo</h1>
      <form id="search-form">
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Buscar cidade..." autocomplete="off">
          <ul id="autocomplete-list" class="hidden"></ul>
        </div>
        <button type="button" id="geo-btn" title="Usar localização atual">📍</button>
        <button type="submit" id="search-btn">Buscar</button>
      </form>
    </header>

    <main>
      <div id="loading" class="hidden">Carregando...</div>
      <div id="error" class="hidden"></div>

      <section id="current-weather" class="hidden">
        <div id="location">
          <h2 id="city-name"></h2>
          <span id="country"></span>
        </div>
        <div id="weather-main">
          <span id="weather-icon"></span>
          <span id="temperature"></span>
          <span id="weather-description"></span>
        </div>
        <div id="weather-details">
          <div class="detail">
            <span class="label">Sensação</span>
            <span class="value" id="feels-like"></span>
          </div>
          <div class="detail">
            <span class="label">Umidade</span>
            <span class="value" id="humidity"></span>
          </div>
          <div class="detail">
            <span class="label">Vento</span>
            <span class="value" id="wind"></span>
          </div>
        </div>
        <div class="actions hidden" id="weather-actions">
          <a href="#" id="details-link" class="btn-link">📊 Detalhes</a>
          <button id="fav-btn" class="btn-icon" title="Salvar nos favoritos">☆</button>
        </div>
      </section>

      <section id="forecast" class="hidden">
        <h3>Previsão para 7 dias</h3>
        <div id="forecast-list"></div>
      </section>
    </main>

    <footer>
      <p>Dados: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a></p>
    </footer>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/home.js"></script>
</body>
</html>
