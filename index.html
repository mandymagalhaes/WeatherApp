<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherApp</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
  <nav class="nav-bar">
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" type="button"><i data-lucide="menu"></i></button>
    <span class="nav-brand">WeatherApp</span>
    <div class="nav-links" id="nav-links">
      <a href="/">Clima</a>
      <a href="details.html">Detalhes</a>
      <a href="favorites.html">Favoritos</a>
    </div>
  </nav>

  <div id="app">
    <header>
      <form id="search-form">
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Buscar cidade..." autocomplete="off">
          <ul id="autocomplete-list" class="hidden"></ul>
        </div>
        <button type="button" id="geo-btn" title="Usar localização atual"><i data-lucide="map-pin"></i></button>
        <button type="submit" id="search-btn">Buscar</button>
      </form>
    </header>

    <main>
      <div id="loading" class="hidden">
        <div class="skeleton-card">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-icon-wrap"></div>
          <div class="skeleton skeleton-temp"></div>
          <div class="skeleton skeleton-line" style="width:50%"></div>
          <div class="skeleton-grid">
            <div class="skeleton skeleton-item"></div>
            <div class="skeleton skeleton-item"></div>
            <div class="skeleton skeleton-item"></div>
          </div>
        </div>
        <div class="skeleton skeleton-section-title"></div>
        <div class="skeleton-forecast">
          <div class="skeleton skeleton-day"></div>
          <div class="skeleton skeleton-day"></div>
          <div class="skeleton skeleton-day"></div>
          <div class="skeleton skeleton-day"></div>
          <div class="skeleton skeleton-day"></div>
        </div>
      </div>
      <div id="error" class="hidden"></div>

      <section id="current-weather" class="hidden">
        <div id="location">
          <h2 id="city-name"></h2>
          <span id="country"></span>
        </div>
        <div id="weather-main">
          <span id="weather-icon"></span>
          <span id="temperature"></span>
          <span id="weather-description"></span>
        </div>
        <div id="weather-details">
          <div class="detail">
            <span class="label">Sensação</span>
            <span class="value" id="feels-like"></span>
          </div>
          <div class="detail">
            <span class="label">Umidade</span>
            <span class="value" id="humidity"></span>
          </div>
          <div class="detail">
            <span class="label">Vento</span>
            <span class="value" id="wind"></span>
          </div>
        </div>
        <div class="actions hidden" id="weather-actions">
          <a href="#" id="details-link" class="btn-link"><i data-lucide="bar-chart-3"></i> Detalhes</a>
          <button id="fav-btn" class="btn-icon" title="Salvar nos favoritos"><i data-lucide="star" id="fav-icon"></i></button>
        </div>
      </section>

      <section id="forecast" class="hidden">
        <h3>Previsão para 7 dias</h3>
        <div id="forecast-list"></div>
      </section>
    </main>

    <footer>
      <p>Dados: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a></p>
    </footer>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/home.js"></script>
</body>
</html>
